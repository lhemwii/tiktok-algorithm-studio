<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Algorithm Studio — Animations TikTok</title>
  <meta name="description" content="Studio de creation video TikTok pour algorithmes de tri et simulations. Enregistrez des animations satisfaisantes en 4K format 9:16.">

  <!-- Open Graph -->
  <meta property="og:title" content="Algorithm Studio — Animations TikTok">
  <meta property="og:description" content="Creez des videos TikTok virales avec des algorithmes de tri visuels et sonores. Anxiety Sort, Stalin Sort, Thanos Sort et plus.">
  <meta property="og:type" content="website">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Algorithm Studio">
  <meta name="twitter:description" content="Sorting algorithms visualized in 4K for TikTok. Record and export.">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="app-layout">

    <!-- Main Studio Area -->
    <main class="content">
      <div class="studio-header">
        <h1>Algorithm Studio</h1>
        <button id="recBtn" class="rec-btn">&#9210; REC</button>
      </div>

      <div id="studio-wrapper">
        <!-- Floating REC Indicator -->
        <div id="rec-status" class="hidden">&#9679; REC 00:00</div>

        <!-- The Core Engine: 1080x1920 scaled to 4K -->
        <canvas id="studio-canvas" width="1080" height="1920"></canvas>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button id="startBtn">&#9654; Demarrer</button>
        <button id="stopBtn" disabled>&#9632; Stop</button>
        <button id="restartBtn" disabled>&#8635; Recommencer</button>
      </div>

      <!-- Render Panel -->
      <div id="render-panel" style="margin-top:1rem;padding:1.2rem;background:rgba(0,0,0,0.08);border-radius:16px;max-width:600px;width:100%;">
        <h3 style="margin-bottom:0.8rem;font-size:1.1rem;">Render 4K MP4</h3>
        <div id="render-config" style="display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:0.8rem;">
          <select id="renderHome" style="padding:0.4rem;border-radius:8px;border:1px solid rgba(0,0,0,0.15);font-size:0.9rem;"></select>
          <span style="align-self:center;font-weight:bold;">vs</span>
          <select id="renderAway" style="padding:0.4rem;border-radius:8px;border:1px solid rgba(0,0,0,0.15);font-size:0.9rem;"></select>
          <input id="renderSeed" type="number" value="42" placeholder="Seed" style="width:70px;padding:0.4rem;border-radius:8px;border:1px solid rgba(0,0,0,0.15);font-size:0.9rem;">
        </div>
        <button id="renderBtn" style="background:#7C3AED;color:#fff;border:none;padding:0.7rem 1.5rem;border-radius:50px;font-weight:bold;font-size:1rem;cursor:pointer;">Render 4K MP4</button>
        <div id="render-status" style="margin-top:0.8rem;display:none;">
          <div style="background:rgba(0,0,0,0.1);border-radius:8px;height:24px;overflow:hidden;">
            <div id="render-progress-bar" style="background:#7C3AED;height:100%;width:0%;transition:width 0.3s;border-radius:8px;"></div>
          </div>
          <p id="render-status-text" style="font-size:0.85rem;margin-top:0.4rem;opacity:0.8;"></p>
        </div>
        <a id="render-download" href="#" download style="display:none;margin-top:0.5rem;color:#7C3AED;font-weight:bold;font-size:0.95rem;">Telecharger le MP4</a>
      </div>

      <!-- TikTok Meta Data -->
      <div id="tiktok-meta">
        <h3>TikTok Ready</h3>
        <p class="meta-row">
          <strong>Description :</strong> <span id="meta-desc"></span>
        </p>
        <p class="meta-row meta-tags">
          <strong>Hashtags :</strong> <span id="meta-tags"></span>
        </p>
      </div>
    </main>

    <!-- Right Sidebar -->
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Gallery</h2>
        <button id="themeToggle" class="theme-btn" title="Toggle Mode">&#127769;</button>
      </div>
      <p class="sidebar-desc">Selectionnez une animation TikTok-ready. Enregistrez en 4K 9:16 60fps.</p>

      <h3 class="category-title">Tri &amp; Donnees</h3>
      <ul id="nav-list" class="nav-category"></ul>
    </nav>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
