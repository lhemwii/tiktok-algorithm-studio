<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>TikTok UI World Cup - Glassmorphism v2</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@600;700&family=Inter:ital,wght@0,500;0,800;0,900;1,900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0f172a;
      --pitch-color: #064E3B; /* Deep rich emerald green */
      
      --neon-white: #ffffff;
      --glass-bg: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glass-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      
      --team-blue: #002395;
      --team-yellow: #FFC107;
      --team-green: #008C45;
      --team-red: #CE2B37;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg-color);
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    .tiktok-frame {
      width: 450px;
      height: 800px;
      position: relative;
      background: var(--pitch-color);
      background-image: 
        repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 40px, transparent 40px, transparent 80px);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      border-radius: 24px;
    }

    /* PITCH LINES (VERTICAL) */
    .pitch-outline {
      position: absolute;
      top: 50px;
      bottom: 50px;
      left: 20px;
      right: 20px;
      border: 6px solid var(--neon-white);
      box-shadow: 0 0 15px rgba(255,255,255,0.5), inset 0 0 15px rgba(255,255,255,0.5);
      border-radius: 8px;
    }

    .mid-line {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 6px;
      background: var(--neon-white);
      transform: translateY(-50%);
      box-shadow: 0 0 15px rgba(255,255,255,0.5);
    }
    .mid-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100px;
      height: 100px;
      border: 6px solid var(--neon-white);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 15px rgba(255,255,255,0.5), inset 0 0 15px rgba(255,255,255,0.5);
    }

    /* NETS (CAGES) */
    .net {
      position: absolute;
      left: 50%;
      width: 140px;
      height: 40px;
      border: 4px solid var(--neon-white);
      transform: translateX(-50%);
      box-shadow: 0 0 15px rgba(255,255,255,0.4), inset 0 0 15px rgba(255,255,255,0.4);
      background: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.3) 5px, rgba(255,255,255,0.3) 7px),
                  repeating-linear-gradient(-45deg, transparent, transparent 5px, rgba(255,255,255,0.3) 5px, rgba(255,255,255,0.3) 7px);
    }
    .net.top {
      top: -40px;
      border-bottom: none;
      border-top-left-radius: 12px;
      border-top-right-radius: 12px;
    }
    .net.bottom {
      bottom: -40px;
      border-top: none;
      border-bottom-left-radius: 12px;
      border-bottom-right-radius: 12px;
    }
    .penalty-area {
      position: absolute;
      left: 50%;
      width: 200px;
      height: 100px;
      border: 4px solid var(--neon-white);
      transform: translateX(-50%);
      box-shadow: 0 0 10px rgba(255,255,255,0.3), inset 0 0 10px rgba(255,255,255,0.3);
    }
    .penalty-area.top { top: 0; border-top: none; }
    .penalty-area.bottom { bottom: 0; border-bottom: none; }

    /* CORE ENTITIES (Balls) */
    .ball {
      position: absolute;
      border-radius: 50%;
      box-shadow: 0 10px 15px rgba(0,0,0,0.4), inset -4px -4px 10px rgba(0,0,0,0.5), inset 4px 4px 10px rgba(255,255,255,0.6);
      border: 2px solid #000;
    }
    .gk { width: 44px; height: 44px; border: 4px solid #FFD700; z-index: 10;}
    .field { width: 38px; height: 38px; z-index: 10;}
    .referee { width: 34px; height: 34px; background: #222; border-color: #fff; top: 40%; left: 30%; z-index: 10;}
    .football { width: 20px; height: 20px; background: #fff; box-shadow: 0 0 15px #fff; top: 45%; left: 45%; z-index: 10;}
    
    .bosnia-color { background: var(--team-blue); }
    .italy-color { background: linear-gradient(90deg, var(--team-green) 33.3%, #fff 33.3%, #fff 66.6%, var(--team-red) 66.6%); }
    
    .eyes { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); display: flex; gap: 4px; }
    .eye { width: 8px; height: 10px; background: #fff; border-radius: 50%; border: 1px solid #000; position:relative; }
    .pupil { width: 4px; height: 4px; background: #000; border-radius: 50%; position: absolute; bottom: 2px; right: 2px; }

    /* GLASSMORPHISM SCOREBOARD (TOP) - THICKER AND STILED */
    .glass-ui {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 30px;
    }

    .scoreboard {
      position: absolute;
      top: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 410px;
      height: 110px; /* Thicker */
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 12px;
      z-index: 20;
    }

    .sb-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }
    .sb-flag-block {
      width: 70px;
      height: 45px;
      border-radius: 8px;
      margin-bottom: 6px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      position: relative;
    }
    .sb-flag-block.bosnia { background: var(--team-blue); overflow:hidden; }
    .sb-flag-block.bosnia::before {
      content: ''; position: absolute; width: 100%; height: 100%; background: var(--team-yellow); clip-path: polygon(100% 0, 100% 100%, 0 100%); left:0; top:0;
    }
    .sb-flag-block.italy { background: linear-gradient(90deg, var(--team-green) 33.3%, #fff 33.3%, #fff 66.6%, var(--team-red) 66.6%); }
    
    .sb-score {
      font-size: 52px;
      font-weight: 900;
      text-shadow: 0 4px 15px rgba(0,0,0,0.6);
      line-height: 1;
    }

    .sb-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
    }
    .sb-timer-box {
      background: rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 8px 20px;
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
    }
    .sb-timer {
      font-family: 'Fira Code', monospace;
      font-size: 28px;
      font-weight: 700;
      color: #fff;
    }
    .sb-half {
      font-size: 14px;
      font-weight: 800;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      margin-top: 6px;
      letter-spacing: 2px;
    }

    /* ACTION TIMELINE / LOGS (BOTTOM PANEL) */
    .action-panel {
      position: absolute;
      bottom: 25px;
      left: 50%;
      transform: translateX(-50%);
      width: 410px;
      height: 220px; /* Big enough for a nice scrolling view */
      z-index: 20;
      padding: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .action-header {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .action-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      /* Scrollbar would be hidden in production animation */
      overflow-y: auto;
      flex: 1;
    }

    .action-item {
      display: flex;
      align-items: center;
      background: rgba(0,0,0,0.2);
      border-radius: 12px;
      padding: 10px 14px;
      transition: background 0.3s;
      border-left: 4px solid transparent;
    }
    
    .action-item.goal { border-left-color: #fff; }
    .action-item.yellow-card { border-left-color: #FFD100; }
    
    .act-time {
      font-family: 'Fira Code', monospace;
      font-weight: 700;
      font-size: 16px;
      width: 55px;
      color: rgba(255,255,255,0.7);
    }
    
    .act-icon {
      font-size: 22px;
      margin-right: 12px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
    }

    .act-desc {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .act-title {
      font-size: 16px;
      font-weight: 800;
      line-height: 1.2;
    }
    .act-team {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
    }

  </style>
</head>
<body>

  <div class="tiktok-frame">
    
    <!-- THE PITCH -->
    <div class="pitch-outline">
      <div class="net top"></div>
      <div class="penalty-area top"></div>
      
      <div class="mid-line"></div>
      <div class="mid-circle"></div>
      
      <div class="net bottom"></div>
      <div class="penalty-area bottom"></div>

      <!-- PLAYERS (1 GK + 2 FIELD + 1 REF + 1 BALL) = MATCH LOGIC OK -->
      <!-- Top Team (ITA) -->
      <div class="ball gk italy-color" style="top: 60px; left: 50%; transform: translateX(-50%);">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>
      <div class="ball field italy-color" style="top: 150px; left: 30%;">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>
      <div class="ball field italy-color" style="top: 150px; left: 70%;">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>

      <!-- Bottom Team (BOS) -->
      <div class="ball gk bosnia-color" style="bottom: 60px; left: 50%; transform: translateX(-50%);">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>
      <div class="ball field bosnia-color" style="bottom: 150px; left: 30%;">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>
      <div class="ball field bosnia-color" style="bottom: 150px; left: 70%;">
        <div class="eyes"><div class="eye"><div class="pupil"></div></div><div class="eye"><div class="pupil"></div></div></div>
      </div>
      
      <div class="football"></div>
      <div class="ball referee"><div class="eyes"><div class="eye" style="background:#fff;"><div class="pupil"></div></div><div class="eye" style="background:#fff;"><div class="pupil"></div></div></div></div>
    </div>

    <!-- SCOREBOARD TIKTOK GLASSMORPHISM -->
    <div class="scoreboard glass-ui">
      
      <div class="sb-team">
        <div class="sb-flag-block bosnia"></div>
        <span class="sb-score">2</span>
      </div>

      <div class="sb-center">
        <div class="sb-timer-box">
          <span class="sb-timer">84:12</span>
        </div>
        <span class="sb-half">2nd Half</span>
      </div>

      <div class="sb-team">
        <div class="sb-flag-block italy"></div>
        <span class="sb-score">1</span>
      </div>

    </div>

    <!-- ACTION TIMELINE / LOGS -->
    <div class="action-panel glass-ui">
      <div class="action-header">
        <span>Timeline & Events</span>
        <span>⏱️</span>
      </div>
      
      <div class="action-list">
        <!-- Event 1 -->
        <div class="action-item goal">
          <span class="act-time">82'</span>
          <span class="act-icon">⚽</span>
          <div class="act-desc">
            <span class="act-title">GOAL!</span>
            <span class="act-team">BOSNIA</span>
          </div>
        </div>

        <!-- Event 2 -->
        <div class="action-item yellow-card">
          <span class="act-time">45+'</span>
          <span class="act-icon">🟨</span>
          <div class="act-desc">
            <span class="act-title">YELLOW CARD</span>
            <span class="act-team">ITALY (Stalling)</span>
          </div>
        </div>

        <!-- Event 3 -->
        <div class="action-item goal">
          <span class="act-time">12'</span>
          <span class="act-icon">⚽</span>
          <div class="act-desc">
            <span class="act-title">GOAL!</span>
            <span class="act-team">BOSNIA</span>
          </div>
        </div>

      </div>
    </div>

  </div>

</body>
</html>
